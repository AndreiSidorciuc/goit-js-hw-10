<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <body>
    <main>
      <div class="contain">
        <h1>Timer</h1>

        <input type="text" id="datetime-picker" />
        <button type="button" data-start disabled>Start</button>

        <div class="timer">
          <div class="field">
            <span data-days>00</span>
            <span>Days</span>
          </div>
          <div class="field">
            <span data-hours>00</span>
            <span>Hours</span>
          </div>
          <div class="field">
            <span data-minutes>00</span>
            <span>Minutes</span>
          </div>
          <div class="field">
            <span data-seconds>00</span>
            <span>Seconds</span>
          </div>
        </div>
      </div>
      <a class="back-link" href="./index.html">Go back</a>

    </main>

  </body>
